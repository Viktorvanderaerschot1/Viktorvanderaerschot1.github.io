<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL ACCESS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fira Code', monospace;
        }

        body {
            background-color: #000;
            color: #0f0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* De normale interface */
        #main-ui {
            text-align: center;
            transition: 0.5s;
        }

        .neon-title {
            font-size: 3rem;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 20px;
        }

        .danger-btn {
            padding: 20px 40px;
            background: transparent;
            border: 2px solid #f00;
            color: #f00;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px #f00;
            transition: 0.3s;
        }

        .danger-btn:hover {
            background: #f00;
            color: #000;
            box-shadow: 0 0 50px #f00;
        }

        /* Het Hacking Scherm (verborgen bij start) */
        #hacker-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            padding: 20px;
            flex-direction: column;
            justify-content: flex-start;
            z-index: 999;
        }

        .matrix-text {
            color: #0f0;
            font-size: 14px;
            line-height: 20px;
            overflow: hidden;
            white-space: nowrap;
        }

        .warning-text {
            color: #f00;
            font-weight: bold;
            font-size: 2rem;
            text-align: center;
            margin-top: 50px;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        .progress-bar-container {
            width: 80%;
            height: 30px;
            border: 2px solid #0f0;
            margin: 50px auto;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #0f0;
            transition: width 0.1s;
        }

    </style>
</head>
<body>

    <div id="main-ui">
        <h1 class="neon-title">SECURE SERVER v4.0</h1>
        <p style="color: #666; margin-bottom: 20px;">Geautoriseerde toegang vereist.</p>
        <button class="danger-btn" onclick="startHack()">NIET KLIKKEN</button>
    </div>

    <div id="hacker-screen">
        <div id="log"></div>
        <div class="warning-text">SYSTEM COMPROMISED - UPLOADING DATA...</div>
        <div class="progress-bar-container">
            <div id="fill" class="progress-fill"></div>
        </div>
    </div>

    <script>
        function startHack() {
            // Verberg normale UI, toon hacker UI
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('hacker-screen').style.display = 'flex';

            const log = document.getElementById('log');
            const fill = document.getElementById('fill');
            
            const messages = [
                "Bypassing firewall...",
                "Injecting SQL code...",
                "Accessing private_folders/pictures/cats...",
                "Downloading passwords.txt...",
                "Cracking encryption (AES-256)...",
                "Establishing back-door connection...",
                "Wiping system logs...",
                "Sending IP address to remote server...",
                "ROOT ACCESS GRANTED."
            ];

            let i = 0;
            let width = 0;

            // Voeg elke seconde een fake log toe
            const interval = setInterval(() => {
                if (i < messages.length) {
                    const line = document.createElement('div');
                    line.className = 'matrix-text';
                    line.innerText = "> " + messages[i];
                    log.appendChild(line);
                    i++;
                }

                // Update de balk
                if (width < 100) {
                    width += 1.5;
                    fill.style.width = width + "%";
                } else {
                    clearInterval(interval);
                    alert("HIER IS NIETS ECHT GEBEURD! JE BENT GEPRANKT.");
                    location.reload(); // Herstart de pagina
                }
            }, 100);
        }
    </script>
</body>
</html>
