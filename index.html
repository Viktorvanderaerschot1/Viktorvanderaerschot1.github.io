<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Cyberpunk Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
        }

        body {
            background-color: #050505;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        /* Bewegende Neon Grid Achtergrond */
        .bg-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(0, 255, 255, 0.05) 25%, rgba(0, 255, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, 0.05) 75%, rgba(0, 255, 255, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 255, 255, 0.05) 25%, rgba(0, 255, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, 0.05) 75%, rgba(0, 255, 255, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            animation: moveGrid 20s linear infinite;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg);
        }

        @keyframes moveGrid {
            from { transform: perspective(500px) rotateX(60deg) translateY(0); }
            to { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* De Main Card */
        .card {
            background: rgba(0, 0, 0, 0.8);
            padding: 50px;
            border: 2px solid #0ff;
            border-radius: 15px;
            box-shadow: 0 0 20px #0ff, inset 0 0 10px #0ff;
            text-align: center;
            max-width: 450px;
            position: relative;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff;
            margin-bottom: 20px;
            letter-spacing: 5px;
        }

        p {
            color: #ff00ff;
            text-shadow: 0 0 5px #ff00ff;
            margin-bottom: 40px;
            font-size: 0.9rem;
        }

        /* Neon Knoppen */
        .neon-btn {
            display: block;
            padding: 15px;
            margin: 15px 0;
            color: #0ff;
            text-decoration: none;
            border: 2px solid #0ff;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            transition: 0.4s;
            overflow: hidden;
        }

        .neon-btn:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 10px #0ff, 0 0 40px #0ff, 0 0 80px #0ff;
        }

        /* Tweede kleur knop (Magenta) */
        .neon-btn.secondary {
            color: #ff00ff;
            border-color: #ff00ff;
        }

        .neon-btn.secondary:hover {
            background: #ff00ff;
            color: #000;
            box-shadow: 0 0 10px #ff00ff, 0 0 40px #ff00ff, 0 0 80px #ff00ff;
        }

        /* Scanline effect over het scherm */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(0, 255, 255, 0.1) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            to { bottom: -100px; }
        }

    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="scanline"></div>

    <div class="card">
        <h1>SYSTEM</h1>
        <p>STATUS: ONLINE // MEGA COOL MODE</p>
        
        <a href="#" class="neon-btn">Enter The Matrix</a>
        <a href="#" class="neon-btn secondary">View Projects</a>
        <a href="https://github.com/" class="neon-btn">GitHub Access</a>
    </div>

</body>
</html>
