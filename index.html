<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Super Coole Site</title>
    <style>
        /* Google Fonts importeren */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            overflow: hidden;
        }

        /* Bewegende achtergrond cirkels */
        .circle {
            position: absolute;
            background: linear-gradient(#ff00cc, #3333ff);
            border-radius: 50%;
            z-index: -1;
            filter: blur(30px);
            animation: move 10s infinite alternate;
        }

        .circle1 { width: 300px; height: 300px; top: -50px; left: -50px; }
        .circle2 { width: 200px; height: 200px; bottom: -50px; right: -50px; animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        /* De Glas-kaart */
        .container {
            position: relative;
            width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            text-align: center;
            color: white;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        p {
            font-weight: 300;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        /* De "Mega Coole" Knoppen */
        .btn {
            display: inline-block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 1);
            color: #24243e;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background: #ff00cc;
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid white;
            color: white;
        }

        .btn-outline:hover {
            background: white;
            color: #24243e;
        }

    </style>
</head>
<body>

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <div class="container">
        <h1>Welkom!</h1>
        <p>Dit is mijn mega coole website, live gehost via GitHub Pages.</p>
        
        <a href="#" class="btn">Mijn Projecten</a>
        <a href="#" class="btn btn-outline">Contact Mij</a>
        <a href="https://github.com/jouwnaam" class="btn">GitHub Profiel</a>
    </div>

</body>
</html>
